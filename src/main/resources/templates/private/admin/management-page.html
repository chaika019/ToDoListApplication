<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title th:text="#{nav.management}">Management</title>
  <link rel="stylesheet" th:href="@{/css/private/admin/management-page.css}">
  <link rel="stylesheet" th:href="@{/css/fragments/header-fragment.css}">
</head>
<body>
<div th:replace="~{fragments/header-fragment.html :: header-fragment (userName=${userName})}"></div>
<div class="page-wrapper">

  <div class="container">
    <div class="header-container">
      <div class="header__text">
        <h2 th:text="#{admin.users.list}">Users List</h2>
      </div>
    </div>
    <div class="records-container" th:with="isCandidatesToDeleteEmpty=${candidatesToDelete == null or candidatesToDelete.isEmpty()}">

      <div class="hint" th:if="${isCandidatesToDeleteEmpty}">
        <span th:text="#{admin.users.empty}">There are no users!</span>
      </div>

      <div class="record" th:if="${!isCandidatesToDeleteEmpty}" th:each="user: ${candidatesToDelete}">
        <div class="record__title">
          <span th:text="${user.email}">user@example.com</span>
          <span th:if="${user.role.name == 'ADMIN'}" th:text="#{admin.users.role_admin}">(admin)</span>
        </div>
        <div class="record__controls">
          <form class="record__controls-form" action="/admin/delete-user" method="post">
            <input type="hidden" name="id" th:value="${user.id}">
            <button class="button_type_close" type="submit">
              <svg width="24" height="24" viewBox="0 0 24 24">
                <path d="M12.071 13.485l-2.828 2.829-1.415-1.415 2.829-2.828-2.829-2.828 1.415-1.415 2.828 2.829L14.9 7.828l.707.708.707.707-2.829 2.828 2.829 2.829-1.415 1.414-2.828-2.829z" fill="#000"></path>
              </svg>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="container" sec:authorize="hasRole('ROLE_SUPER_ADMIN')">
    <div class="header-container">
      <div class="header__text">
        <h2 th:text="#{admin.upgrade.title}">Upgrade to Admin</h2>
      </div>
    </div>
    <div class="form-container" th:with="isCandidatesToUpgradeEmpty=${candidatesToUpgrade == null or candidatesToUpgrade.isEmpty()}">
      <form class="form-container__form" action="/super-admin/make-user-admin" method="post">
        <div class="form-container__input-wrapper">
          <select class="form-container__select" name="id">
            <option th:if="${isCandidatesToUpgradeEmpty}" th:text="#{admin.upgrade.empty}" selected disabled>There are no users</option>
            <option th:if="${!isCandidatesToUpgradeEmpty}" th:each="user: ${candidatesToUpgrade}"
                    th:value="${user.id}" th:text="${user.email}"></option>
          </select>
        </div>
        <div class="form-container__button-wrapper">
          <button class="form-container__button" type="submit"
                  th:disabled="${isCandidatesToUpgradeEmpty}"
                  th:classappend="${isCandidatesToUpgradeEmpty ? 'form-container__button_disabled' : ''}"
                  th:text="#{admin.upgrade.button}">Upgrade</button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
